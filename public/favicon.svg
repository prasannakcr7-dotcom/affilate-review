<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="SecondLook icon">
  <title>SecondLook icon - overlapping frames</title>
  <rect width="200" height="200" rx="36" fill="#14213D"/>
  <!-- back frame -->
  <rect x="58" y="58" width="64" height="64" rx="8" fill="none" stroke="#9AA4C4" stroke-width="7"/>
  <!-- front frame, offset down-right, suggesting a second look at the same subject -->
  <rect x="78" y="78" width="64" height="64" rx="8" fill="#14213D" stroke="#EAE7DD" stroke-width="7"/>
</svg>
